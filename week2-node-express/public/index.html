<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Week 2 API</title>
  </head>
  <body>
    <h1>Welcome to My Week 2 API!</h1>
    <p>This is a static welcome page served by the Express.js API.</p>
    <p>Available endpoints:</p>
    <ul>
      <li>GET / - Returns a welcome message</li>
      <li>POST /user - Create a user (requires name and email in JSON body)</li>
      <li>GET /user/:id - Get user profile by ID</li>
    </ul>
  </body>
</html>
